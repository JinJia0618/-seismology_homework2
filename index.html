<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震學 Master Pro - 系統化精熟互動手冊</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 全域物理動畫引擎 */
        @keyframes quake-pulse { 0% { r: 0; opacity: 1; stroke-width: 4; } 100% { r: 150; opacity: 0; stroke-width: 1; } }
        @keyframes attenuation-path { 0% { stroke-dashoffset: 800; } 100% { stroke-dashoffset: 0; } }
        
        /* 建築物搖晃效果 */
        @keyframes sway-heavy { 0%, 100% { transform: skewX(-7deg); } 50% { transform: skewX(7deg); } }
        @keyframes sway-mid { 0%, 100% { transform: skewX(-2deg); } 50% { transform: skewX(2deg); } }
        @keyframes sway-light { 0%, 100% { transform: skewX(-0.3deg); } 50% { transform: skewX(0.3deg); } }
        
        /* 板塊斷裂與回跳特效 */
        @keyframes crack-shudder { 0%, 100% { transform: translate(0, 0); } 10%, 30%, 50%, 70%, 90% { transform: translate(-4px, -2px); } 20%, 40%, 60%, 80% { transform: translate(4px, 2px); } }
        @keyframes fracture-glow { 0% { stroke: #ef4444; opacity: 0.8; } 50% { stroke: #fff; opacity: 1; stroke-width: 4; } 100% { stroke: #ef4444; opacity: 0.8; } }
        @keyframes rebound-left { 0% { transform: translateX(0); } 100% { transform: translateX(-15px); } }
        @keyframes rebound-right { 0% { transform: translateX(0); } 100% { transform: translateX(15px); } }
        
        /* 自然地震波滾動 */
        @keyframes wave-scroll { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
        
        /* 核爆與受損特效 */
        @keyframes nuke-core-glow { 0%, 100% { r: 6; opacity: 0.9; filter: blur(2px); } 50% { r: 20; opacity: 1; filter: blur(8px); } }
        @keyframes nuke-wave { 0% { r: 10; opacity: 1; stroke-width: 4; } 100% { r: 130; opacity: 0; stroke-width: 0.5; } }
        @keyframes structure-damage-shake { 0%, 100% { transform: translate(0, 0); } 10%, 50%, 90% { transform: translate(-6px, -3px) rotate(-1deg); } 30%, 70% { transform: translate(6px, 3px) rotate(1deg); } }

        /* 土壤液化與一般搖晃 */
        @keyframes sand-shimmer { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(2px, -3px); } }
        @keyframes house-collapse { 0% { transform: rotate(0) translateY(0); } 50% { transform: rotate(20deg) translateY(15px); } 100% { transform: rotate(20deg) translateY(15px); } }
        @keyframes sway-anim { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        @keyframes shield-pulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }

        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif; }
        .crack-line { stroke-dasharray: 4; animation: fracture-glow 0.6s infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 1. 子組件：穩定圖標渲染器 ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: { class: className, 'stroke-width': 2.5 },
                        nameAttr: 'data-lucide-scoped'
                    });
                }
            }, [name, className]);

            return (
                <span ref={iconRef} key={`${name}-${className}`} className={`inline-flex items-center justify-center transition-colors duration-300 ${className}`}>
                    <i data-lucide-scoped={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        // --- 2. 物理動畫子組件 ---
        const WaveProp = ({ type }) => {
            const cols = 22;
            const rows = 6;
            return (
                <div className="w-full">
                    <svg width="100%" height="180" viewBox="0 0 600 180" className="mx-auto overflow-visible">
                        {[...Array(cols)].map((_, i) => (
                            [...Array(rows)].map((_, j) => {
                                const x = 50 + i * 24;
                                const y = 35 + j * 24;
                                const delay = i * 0.12; 
                                let name = type === 'p' ? "waveP" : type === 's' ? "waveS" : "waveR";
                                return (
                                    <circle key={`${i}-${j}`} cx={x} cy={y} r={j === 0 ? 5 : 2.5} fill={type === 'p' ? '#10b981' : type === 's' ? '#f87171' : '#60a5fa'} opacity={1 - j * 0.15}
                                        style={{ animationName: name, animationDuration: type==='s'?'1.8s':'1.2s', animationIterationCount: "infinite", animationTimingFunction: "ease-in-out", animationDelay: `${delay}s` }}
                                    />
                                );
                            })
                        ))}
                    </svg>
                    <style>{`
                        @keyframes waveP { 0%, 100% { transform: translateX(0); opacity: 0.4; } 50% { transform: translateX(15px); opacity: 1; } }
                        @keyframes waveS { 0%, 100% { transform: translateY(-20px); } 50% { transform: translateY(20px); } }
                        @keyframes waveR { 0% { transform: translate(0, 0); } 25% { transform: translate(10px, -10px); } 50% { transform: translate(0, 0); } 75% { transform: translate(-10px, 10px); } 100% { transform: translate(0, 0); } }
                    `}</style>
                </div>
            );
        };

        // --- 3. 動畫模擬引擎 (全互動化) ---
        const VisualSim = ({ type, waveType, setWaveType, dampingMode, setDampingMode, resonanceFreq, setResonanceFreq, forecastYear, setForecastYear, gapStatus, setGapStatus, nuclearType, setNuclearType, naturalQuakeActive, setNaturalQuakeActive }) => {
            if (!type || type === 'none') return null;

            switch (type) {
                case 'quake_propagation': return (
                    <div className="relative w-full h-64 flex items-center justify-center bg-slate-900 rounded-[2.5rem] border-4 border-slate-800 overflow-hidden shadow-inner">
                        <svg width="400" height="400" className="absolute">
                            <circle cx="200" cy="200" r="6" fill="#ef4444" />
                            {[0, 0.8, 1.6, 2.4].map((delay) => (
                                <circle key={delay} cx="200" cy="200" r="0" fill="none" stroke="#10b981" strokeWidth="2" style={{ animation: `quake-pulse 3.2s linear infinite ${delay}s` }} />
                            ))}
                        </svg>
                        <div className="z-10 text-center">
                            <div className="text-emerald-400 font-black text-xs uppercase tracking-[0.4em] mb-2">能量激發與波前傳播模擬</div>
                        </div>
                    </div>
                );
                case 'wave_interactive': return (
                    <div className="w-full flex flex-col items-center bg-slate-900 p-8 rounded-[2.5rem] border-4 border-slate-800 shadow-xl">
                        <WaveProp type={waveType} />
                        <div className="flex gap-4 mt-8 bg-slate-800/80 p-2 rounded-full border border-slate-700">
                            {['p', 's', 'rayleigh'].map(t => (
                                <button key={t} onClick={() => setWaveType(t)} className={`px-6 py-1.5 rounded-full text-[9px] font-black uppercase transition-all ${waveType === t ? 'bg-emerald-500 text-white shadow-lg' : 'text-slate-500'}`}>{t}</button>
                            ))}
                        </div>
                    </div>
                );
                case 'hazard_risk_new': return (
                    <div className="w-full flex flex-col md:flex-row items-center justify-around bg-slate-900 h-64 rounded-[2.5rem] border-4 border-slate-800 p-8 shadow-2xl">
                        <div className="flex flex-col items-center gap-4 border-r border-white/10 pr-10 text-center">
                            <div className="relative w-24 h-24 bg-slate-800 rounded-full flex items-center justify-center border border-amber-500/20 shadow-lg">
                                <Icon name="zap" size={40} className="text-amber-500 animate-pulse" />
                                <div className="absolute inset-0 border-2 border-amber-500/20 rounded-full animate-ping"></div>
                            </div>
                            <span className="text-[10px] text-amber-500 font-black uppercase tracking-widest leading-none">Hazard<br/>(力/物理)</span>
                        </div>
                        <div className="flex flex-col items-center gap-4 pl-10 text-center">
                            <div className="relative w-24 h-24 bg-slate-800 rounded-full flex items-center justify-center border border-red-500/20 shadow-lg">
                                <Icon name="shield-alert" size={40} className="text-red-500" />
                                <div className="absolute top-0 right-0 w-8 h-8 bg-emerald-500 rounded-full flex items-center justify-center animate-[shield-pulse_2s_infinite]">
                                    <Icon name="check" size={12} className="text-white" />
                                </div>
                            </div>
                            <span className="text-[10px] text-red-500 font-black uppercase tracking-widest leading-none">Risk<br/>(損/管)</span>
                        </div>
                    </div>
                );
                case 'attenuation_pro': return (
                    <div className="w-full flex flex-col items-center justify-center bg-slate-900 h-64 rounded-[2.5rem] border-4 border-slate-800 shadow-inner">
                        <svg width="500" height="200" viewBox="0 0 500 200">
                            <defs>
                                <linearGradient id="fadeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stopColor="#10b981" stopOpacity="1" />
                                    <stop offset="100%" stopColor="#334155" stopOpacity="0.2" />
                                </linearGradient>
                            </defs>
                            <path d="M 10,100 C 40,10 70,190 100,100 C 130,30 160,170 190,100 C 220,50 250,150 280,100 C 310,70 340,130 370,100 C 400,85 430,115 460,100" 
                                fill="none" stroke="url(#fadeGrad)" strokeWidth="5" strokeLinecap="round" strokeDasharray="800"
                                style={{ animation: "attenuation-path 5s ease-in-out infinite" }} />
                            <text x="20" y="40" fill="#10b981" fontSize="10" font-weight="900">震源能量 (A₀)</text>
                            <text x="330" y="160" fill="#64748b" fontSize="10" font-weight="900">隨距離衰減 (1/r)</text>
                        </svg>
                    </div>
                );
                case 'structure_damping_interactive': return (
                    <div className="w-full flex flex-col items-center bg-slate-900 rounded-[2.5rem] border-4 border-slate-800 p-8 shadow-2xl">
                        <div className="relative w-64 h-40 border-b-4 border-slate-700 flex justify-center items-end mb-8">
                             <div className="w-16 bg-indigo-500 rounded-t-lg relative shadow-lg" style={{ height: '80%', transformOrigin: 'bottom', animation: dampingMode === 'off' ? 'sway-heavy 1.5s infinite ease-in-out' : 'sway-light 3.5s infinite ease-in-out' }}>
                                 {dampingMode === 'on' && <div className="absolute top-1/2 left-1/2 -translate-x-1/2 w-4 h-10 bg-slate-800 rounded-full flex flex-col justify-around py-2 border border-emerald-400/50"><div className="w-full h-1 bg-emerald-400 animate-pulse"></div><div className="w-full h-1 bg-emerald-400 animate-pulse"></div></div>}
                             </div>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => setDampingMode('off')} className={`px-5 py-1.5 rounded-full text-[9px] font-black uppercase transition-all ${dampingMode === 'off' ? 'bg-red-500 text-white shadow-lg' : 'bg-slate-800 text-slate-500'}`}>未加阻尼</button>
                            <button onClick={() => setDampingMode('on')} className={`px-5 py-1.5 rounded-full text-[9px] font-black uppercase transition-all ${dampingMode === 'on' ? 'bg-emerald-500 text-white shadow-lg' : 'bg-slate-800 text-slate-500'}`}>加裝阻尼器</button>
                        </div>
                    </div>
                );
                case 'engineering_resonance_interactive': return (
                    <div className="w-full flex flex-col items-center bg-slate-900 rounded-[2.5rem] border-4 border-slate-800 p-8 shadow-2xl">
                        <div className="flex items-end justify-center gap-10 h-44 w-full border-b-4 border-slate-700 mb-8 px-4">
                            <div className="w-10 bg-slate-700 rounded-t-xl relative" style={{ height: '90%', transformOrigin: 'bottom', animation: resonanceFreq === 'low' ? 'sway-heavy 4s infinite ease-in-out' : 'sway-light 4s infinite ease-in-out' }}>
                                <span className="absolute -top-12 left-0 w-full text-center text-[7px] text-slate-500 font-black uppercase tracking-widest leading-tight">高樓<br/>Tall</span>
                            </div>
                            <div className="w-10 bg-indigo-600 rounded-t-xl relative" style={{ height: '60%', transformOrigin: 'bottom', animation: resonanceFreq === 'mid' ? 'sway-heavy 2s infinite ease-in-out' : 'sway-light 2s infinite ease-in-out' }}>
                                <span className="absolute -top-12 left-0 w-full text-center text-[7px] text-indigo-400 font-black uppercase tracking-widest leading-tight">中型<br/>Mid</span>
                            </div>
                            <div className="w-10 bg-emerald-600 rounded-t-xl relative" style={{ height: '30%', transformOrigin: 'bottom', animation: resonanceFreq === 'high' ? 'sway-heavy 0.8s infinite ease-in-out' : 'sway-light 0.8s infinite ease-in-out' }}>
                                <span className="absolute -top-12 left-0 w-full text-center text-[7px] text-emerald-500 font-black uppercase tracking-widest leading-tight">矮房<br/>Short</span>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            {['low', 'mid', 'high'].map(f => (
                                <button key={f} onClick={() => setResonanceFreq(f)} className={`px-3 py-1.5 rounded-full text-[8px] font-black uppercase transition-all ${resonanceFreq === f ? 'bg-emerald-500 text-white shadow-lg scale-105' : 'bg-slate-800 text-slate-500'}`}>
                                    {f === 'low' ? '低頻率 (長週期)' : f === 'mid' ? '中頻率波' : '高頻率 (短週期)'}
                                </button>
                            ))}
                        </div>
                    </div>
                );
                case 'liquefaction': return (
                    <div className="w-full flex flex-col items-center bg-slate-900 rounded-[2.5rem] border-4 border-slate-800 p-8 shadow-inner overflow-hidden">
                        <svg width="400" height="180" viewBox="0 0 400 180">
                            <rect x="50" y="30" width="300" height="130" fill="#451a03" opacity="0.2" rx="25" />
                            {[...Array(60)].map((_, i) => (
                                <circle key={i} cx={75 + (i%12)*25} cy={50 + Math.floor(i/12)*25} r={3.5} fill="#fbbf24" 
                                    style={{ animation: `sand-shimmer ${1 + Math.random()}s infinite ease-in-out`, animationDelay: `${Math.random() * 2}s` }} />
                            ))}
                            <g style={{ animation: "house-collapse 3.5s forwards", transformOrigin: "200px 80px" }}>
                                <rect x="178" y="45" width="44" height="35" fill="#fff" stroke="#000" strokeWidth="2" />
                                <path d="M178 45 L200 20 L222 45 Z" fill="#ef4444" stroke="#000" strokeWidth="2" />
                            </g>
                        </svg>
                        <p className="text-[8px] text-amber-500 font-black uppercase mt-4">有效應力歸零 (流體化模擬)</p>
                    </div>
                );
                case 'gap_rupture_advanced': return (
                    <div className="w-full flex flex-col items-center bg-slate-900 rounded-[2.5rem] border-4 border-slate-800 p-12 shadow-2xl">
                        <div className="flex items-center gap-1 w-full justify-center relative">
                            <div className={`w-24 h-14 bg-emerald-600/30 rounded-l-2xl border border-emerald-500/20 transition-all duration-700 ${gapStatus === 'rupture' ? 'animate-[rebound-left_0.5s_forwards] opacity-80' : ''}`}></div>
                            <div onClick={() => setGapStatus(gapStatus === 'locked' ? 'rupture' : 'locked')} 
                                 className={`relative w-48 h-24 flex items-center justify-center cursor-pointer transition-all duration-700 rounded-2xl border-4 ${gapStatus === 'locked' ? 'bg-red-950/40 border-red-500 animate-pulse' : 'bg-slate-800 border-white shadow-[0_0_40px_rgba(239,68,68,0.6)]'}`}>
                                <div className={`text-center font-black uppercase text-[10px] z-20 ${gapStatus === 'locked' ? 'text-red-500' : 'text-white animate-bounce'}`}>
                                    {gapStatus === 'locked' ? 'Locked (應力累積)' : 'PLATE RUPTURED!'}
                                </div>
                                {gapStatus === 'rupture' && (
                                    <svg className="absolute inset-0 w-full h-full pointer-events-none opacity-90 scale-110">
                                        <path d="M0,48 L30,20 L60,70 L90,10 L120,80 L150,30 L192,48" fill="none" stroke="#ef4444" strokeWidth="4" className="crack-line" style={{ strokeLinejoin: 'round' }} />
                                    </svg>
                                )}
                            </div>
                            <div className={`w-24 h-14 bg-emerald-600/30 rounded-r-2xl border border-emerald-500/20 transition-all duration-700 ${gapStatus === 'rupture' ? 'animate-[rebound-right_0.5s_forwards] opacity-80' : ''}`}></div>
                        </div>
                        <p className="text-[9px] text-slate-500 mt-10 font-mono uppercase tracking-[0.4em]">點擊紅色閉鎖段觀察擬真斷裂與回跳效果</p>
                    </div>
                );
                case 'natural_seismic_trace': return (
                    <div className="w-full flex flex-col items-center bg-slate-900 rounded-[2.5rem] border-4 border-slate-800 p-12 shadow-2xl overflow-hidden">
                        <div className="relative w-full h-32 flex items-center bg-slate-950/50 rounded-xl border border-white/5 shadow-inner">
                             <svg width="200%" height="100%" viewBox="0 0 1000 100" className="absolute left-0" style={{ animation: "wave-scroll 12s linear infinite" }}>
                                 <path d="M0,50 L10,48 L20,52 L30,45 L40,55 L50,50 L70,50 L80,45 L90,55 L100,50 L120,50 L140,35 L160,65 L180,50 L220,50 L240,42 L260,58 L280,50 L320,50 L340,15 L360,85 L380,50 L420,50 L440,47 L460,53 L480,50 L500,50 L510,48 L520,52 L530,45 L540,55 L550,50 L570,50 L580,45 L590,55 L600,50 L620,50 L640,35 L660,65 L680,50 L720,50 L740,42 L760,58 L780,50 L820,50 L840,15 L860,85 L880,50 L920,50 L940,47 L960,53 L980,50 L1000,50" 
                                       fill="none" stroke="#10b981" strokeWidth="2" opacity="0.6" />
                             </svg>
                             <div className="absolute inset-0 bg-gradient-to-r from-slate-900 via-transparent to-slate-900 pointer-events-none"></div>
                        </div>
                        <div className="mt-8 px-6 py-2 bg-slate-800 border border-emerald-500/30 rounded-full">
                            <span className="text-[10px] text-emerald-400 font-black uppercase tracking-widest italic">Digital Seismogram Trace (Synthetic)</span>
                        </div>
                    </div>
                );
                case 'forecast_interactive': return (
                    <div className="w-full flex flex-col items-center bg-slate-900 rounded-[2.5rem] border-4 border-slate-800 p-10 shadow-2xl">
                        <div className="relative w-44 h-44 rounded-full border-8 border-slate-700 bg-slate-800 flex items-center justify-center overflow-hidden shadow-2xl">
                            <div className="absolute w-1.5 h-18 bg-emerald-500 rounded-full origin-bottom shadow-[0_0_15px_#10b981]" style={{ top: '30px', animation: `sway-anim ${forecastYear === 50 ? '25s' : forecastYear === 30 ? '12s' : '5s'} linear infinite` }}></div>
                            <div className="z-10 bg-slate-900/95 p-5 rounded-3xl border border-white/10 text-center shadow-inner">
                                <div className="text-emerald-400 font-black text-2xl leading-none">{forecastYear}Y / 70%</div>
                                <p className="text-[8px] text-slate-500 uppercase mt-2 tracking-widest font-black">機率統計預報模型</p>
                            </div>
                        </div>
                        <div className="flex gap-4 mt-10">
                             {[10, 30, 50].map(y => (
                                 <button key={y} onClick={() => setForecastYear(y)} className={`px-8 py-2 rounded-full text-[9px] font-black transition-all ${forecastYear === y ? 'bg-emerald-600 text-white shadow-xl scale-110' : 'bg-slate-800 text-slate-500 border border-slate-700'}`}>{y} 年評估</button>
                             ))}
                        </div>
                    </div>
                );
                case 'nuclear_quake_compare_advanced': return (
                    <div className="w-full flex flex-col items-center bg-slate-900 rounded-[2.5rem] border-4 border-slate-800 p-8 shadow-2xl">
                        <div className="w-full flex items-center justify-around mb-10 min-h-[220px]">
                            {nuclearType === 'nuke' ? (
                                <div className="flex flex-col items-center gap-4">
                                    <div className="relative w-44 h-44 bg-slate-800 rounded-full border-2 border-red-500 flex items-center justify-center overflow-hidden shadow-[0_0_60px_rgba(239,68,68,0.4)]">
                                        <svg width="140" height="140" className="absolute">
                                            {[0.1, 0.8, 1.5].map(d => <circle key={d} cx="70" cy="70" r="0" fill="none" stroke="#f87171" strokeWidth="3" style={{ animation: `nuke-wave 2.5s infinite ${d}s` }} />)}
                                            <circle cx="70" cy="70" r="12" fill="#fff" className="animate-[nuke-core-glow_1.5s_infinite]" />
                                            <circle cx="70" cy="70" r="8" fill="#ef4444" />
                                        </svg>
                                    </div>
                                    <span className="text-[9px] text-red-500 font-black uppercase tracking-widest">Nuclear (球形膨脹源)</span>
                                </div>
                            ) : (
                                <div className="flex flex-col items-center gap-4">
                                    <div className={`relative w-44 h-44 bg-slate-800 rounded-3xl border-2 border-blue-500 flex items-center justify-center ${naturalQuakeActive ? 'animate-[structure-damage-shake_0.1s_infinite] border-red-500 shadow-[0_0_30px_rgba(239,68,68,0.4)]' : ''}`}>
                                        {naturalQuakeActive && (
                                            <svg className="absolute inset-0 w-full h-full p-8 opacity-80">
                                                <path d="M10,20 L50,60 L20,110" fill="none" stroke="#ef4444" strokeWidth="4" className="crack-line" style={{ strokeLinejoin: 'round' }} />
                                                <path d="M130,30 L90,80 L110,130" fill="none" stroke="#ef4444" strokeWidth="4" className="crack-line" style={{ strokeLinejoin: 'round' }} />
                                            </svg>
                                        )}
                                        <Icon name="activity" size={72} className={naturalQuakeActive ? 'text-red-500' : 'text-blue-500'} />
                                        {naturalQuakeActive && <div className="absolute top-4 left-4 text-[7px] bg-red-600 text-white px-2 py-0.5 rounded font-black animate-pulse shadow-lg">DAMAGE ACTIVE</div>}
                                    </div>
                                    <span className="text-[9px] text-blue-500 font-black uppercase tracking-widest">{naturalQuakeActive ? 'Fracturing' : 'Earthquake (剪力源)'}</span>
                                </div>
                            )}
                        </div>
                        <div className="flex gap-4">
                            <button onClick={() => setNuclearType('nuke')} className={`px-8 py-2 rounded-full text-[9px] font-black transition-all ${nuclearType === 'nuke' ? 'bg-red-600 text-white shadow-2xl border-white/20' : 'bg-slate-800 text-slate-500 border border-slate-700'}`}>核爆模式</button>
                            <button onClick={() => {
