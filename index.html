<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震學 Master Pro - 精熟升級版</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 全域物理動畫引擎 */
        @keyframes quake-pulse {
            0% { r: 0; opacity: 1; stroke-width: 4; }
            100% { r: 150; opacity: 0; stroke-width: 1; }
        }
        @keyframes attenuation-path {
            0% { stroke-dashoffset: 800; }
            100% { stroke-dashoffset: 0; }
        }
        @keyframes tower-sway-slow { 0%, 100% { transform: skewX(-3deg); } 50% { transform: skewX(3deg); } }
        @keyframes tower-sway-fast { 0%, 100% { transform: skewX(-7deg); } 50% { transform: skewX(7deg); } }
        @keyframes nuclear-expand { 0% { r: 5; opacity: 1; } 100% { r: 80; opacity: 0; } }
        @keyframes fault-slip { 0% { transform: translateX(-12px); } 50% { transform: translateX(12px); } 100% { transform: translateX(-12px); } }
        @keyframes sand-shimmer { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(2px, -3px); } }
        @keyframes house-collapse { 0% { transform: rotate(0) translateY(0); } 50% { transform: rotate(18deg) translateY(12px); } 100% { transform: rotate(0) translateY(0); } }
        @keyframes waveP { 0%, 100% { transform: translateX(0); opacity: 0.4; } 50% { transform: translateX(15px); opacity: 1; } }
        @keyframes waveS { 0%, 100% { transform: translateY(-20px); } 50% { transform: translateY(20px); } }
        @keyframes waveR { 0% { transform: translate(0, 0); } 25% { transform: translate(12px, -12px); } 50% { transform: translate(0, 0); } 75% { transform: translate(-12px, 12px); } 100% { transform: translate(0, 0); } }
        @keyframes sway-anim { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        @keyframes gap-pulse { 0%, 100% { opacity: 0.2; fill: #ef4444; } 50% { opacity: 0.9; fill: #f87171; } }

        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Microsoft JhengHei", sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 1. 子組件：穩定圖標渲染器 (修正 Lucide 標籤全域連動與跳動報錯) ---
        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: {
                            class: className,
                            'stroke-width': 2.5
                        },
                        nameAttr: 'data-lucide-scoped'
                    });
                }
            }, [name, className]);

            return (
                <span ref={iconRef} key={`${name}-${className}`} className={`inline-flex items-center justify-center transition-colors duration-300 ${className}`}>
                    <i data-lucide-scoped={name} style={{ width: size, height: size }}></i>
                </span>
            );
        };

        // --- 2. 物理動畫子組件 ---
        const WaveProp = ({ type }) => {
            const cols = 22;
            const rows = 6;
            return (
                <div className="w-full">
                    <svg width="100%" height="180" viewBox="0 0 600 180" className="mx-auto overflow-visible">
                        {[...Array(cols)].map((_, i) => (
                            [...Array(rows)].map((_, j) => {
                                const x = 50 + i * 24;
                                const y = 35 + j * 24;
                                const delay = i * 0.15; 
                                let name = type === 'p' ? "waveP" : type === 's' ? "waveS" : "waveR";
                                return (
                                    <circle key={`${i}-${j}`} cx={x} cy={y} r={j === 0 ? 5 : 2.5} fill={type === 'p' ? '#10b981' : type === 's' ? '#f87171' : '#60a5fa'} opacity={1 - j * 0.15}
                                        style={{ 
                                            animationName: name, 
                                            animationDuration: type==='s'?'1.8s':'1.2s', 
                                            animationIterationCount: "infinite", 
                                            animationTimingFunction: "ease-in-out", 
                                            animationDelay: `${delay}s` 
                                        }}
                                    />
                                );
                            })
                        ))}
                    </svg>
                </div>
            );
        };

        // --- 3. 動畫模擬引擎 ---
        const VisualSim = ({ type, waveType, setWaveType }) => {
            if (!type || type === 'none') return null;
            switch (type) {
                case 'quake_propagation': return (
                    <div className="relative w-full h-64 flex items-center justify-center bg-slate-900 rounded-[2.5rem] overflow-hidden border-4 border-slate-800 shadow-inner">
                        <svg width="400" height="400" className="absolute">
                            <circle cx="200" cy="200" r="6" fill="#ef4444" />
                            {[0, 0.8, 1.6, 2.4].map((delay) => (
                                <circle key={delay} cx="200" cy="200" r="0" fill="none" stroke="#10b981" strokeWidth="2" 
                                    style={{ animation: `quake-pulse 3.2s linear infinite ${delay}s` }} />
                            ))}
                        </svg>
                        <div className="z-10 text-center">
                            <div className="text-emerald-400 font-black text-xs uppercase tracking-[0.4em] mb-2">能量激發與波前傳播模擬</div>
                            <div className="text-slate-500 font-mono text-[10px]">Spherical Wavefront Spreading</div>
                        </div>
                    </div>
                );
                case 'wave_interactive': return (
                    <div className="w-full flex flex-col items-center bg-slate-900 p-8 rounded-[2.5rem] border-4 border-slate-800 shadow-xl">
                        <WaveProp type={waveType} />
                        <div className="flex gap-4 mt-8 bg-slate-800/80 p-2 rounded-full border border-slate-700">
                            {['p', 's', 'rayleigh'].map(t => (
                                <button key={t} onClick={() => setWaveType(t)} className={`px-6 py-1.5 rounded-full text-[9px] font-black uppercase transition-all ${waveType === t ? 'bg-emerald-500 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>{t}</button>
                            ))}
                        </div>
                    </div>
                );
                case 'hazard_risk': return (
                    <div className="flex flex-col items-center justify-center bg-slate-900 h-64 rounded-[2.5rem] border-4 border-slate-800 shadow-inner">
                        <div className="flex flex-col items-center gap-10 animate-[sway-anim_4s_ease-in-out_infinite]">
                            <svg width="320" height="120" viewBox="0 0 320 120">
                                <line x1="20" y1="90" x2="300" y2="90" stroke="#fff" strokeWidth="6" strokeLinecap="round" />
                                <rect x="30" y="40" width="80" height="50" fill="#ef4444" rx="15" />
                                <text x="40" y="70" fill="#fff" fontSize="10" fontWeight="bold">HAZARD</text>
                                <rect x="200" y="40" width="80" height="50" fill="#10b981" rx="15" />
                                <text x="225" y="70" fill="#fff" fontSize="10" fontWeight="bold">RISK</text>
                                <circle cx="160" cy="90" r="12" fill="#475569" />
                            </svg>
                        </div>
                    </div>
                );
                case 'attenuation_pro': return (
                    <div className="w-full flex flex-col items-center justify-center bg-slate-900 h-64 rounded-[2.5rem] border-4 border-slate-800 shadow-inner">
                        <svg width="500" height="200" viewBox="0 0 500 200">
                            <defs>
                                <linearGradient id="fadeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stopColor="#10b981" stopOpacity="1" />
                                    <stop offset="100%" stopColor="#334155" stopOpacity="0.2" />
                                </linearGradient>
                            </defs>
                            <path d="M 10,100 C 40,10 70,190 100,100 C 130,30 160,170 190,100 C 220,50 250,150 280,100 C 310,70 340,130 370,100 C 400,85 430,115 460,100" 
                                fill="none" stroke="url(#fadeGrad)" strokeWidth="5" strokeLinecap="round" strokeDasharray="800"
                                style={{ animation: "attenuation-path 5s ease-in-out infinite" }} />
                            <text x="20" y="40" fill="#10b981" fontSize="10" fontWeight="black">震源強能 (A₀)</text>
                            <text x="350" y="160" fill="#64748b" fontSize="10" fontWeight="black">能量耗散 (1/r)</text>
                        </svg>
                    </div>
                );
                case 'structure_sim': return (
                    <div className="flex flex-col items-center justify-center bg-slate-900 h-64 rounded-[2.5rem] border-4 border-slate-800 shadow-inner">
                        <div className="relative w-64 h-48 border-b-4 border-slate-700 flex justify-around items-end px-4">
                            <div className="w-12 bg-indigo-500 rounded-t-lg relative shadow-lg" style={{ height: '70%', animation: 'tower-sway-slow 2.5s infinite ease-in-out' }}>
                                <div className="absolute top-1/2 left-1/2 -translate-x-1/2 w-4 h-8 bg-slate-800 rounded flex flex-col justify-around p-1">
                                    <div className="w-full h-0.5 bg-emerald-400 animate-pulse"></div>
                                    <div className="w-full h-0.5 bg-emerald-400 animate-pulse"></div>
                                </div>
                                <span className="absolute -top-6 left-0 w-full text-center text-[7px] text-slate-400 font-black uppercase tracking-widest">Damper</span>
                            </div>
                            <div className="w-12 bg-slate-400 rounded-t-lg shadow-lg" style={{ height: '70%', animation: 'tower-sway-fast 0.8s infinite ease-in-out' }}>
                                <span className="absolute -top-6 left-0 w-full text-center text-[7px] text-slate-400 font-black uppercase tracking-widest">Rigid</span>
                            </div>
                        </div>
                    </div>
                );
                case 'engineering_resonance': return (
                    <div className="flex flex-col items-center justify-center bg-slate-900 h-64 rounded-[2.5rem] border-4 border-slate-800 shadow-inner">
                        <div className="flex items-end justify-center gap-16 h-48 w-full px-10">
                            <div className="w-14 bg-slate-700 rounded-t-xl relative" style={{ height: '85%', transformOrigin: 'bottom', animation: 'tower-sway-slow 4s infinite ease-in-out' }}>
                                <span className="absolute -top-10 left-0 w-full text-center text-[8px] text-slate-400 font-bold uppercase tracking-widest leading-tight">高樓<br/>(長週期)</span>
                            </div>
                            <div className="w-14 bg-emerald-600 rounded-t-xl relative" style={{ height: '40%', transformOrigin: 'bottom', animation: 'tower-sway-fast 1.2s infinite ease-in-out' }}>
                                <span className="absolute -top-10 left-0 w-full text-center text-[8px] text-emerald-500 font-bold uppercase tracking-widest leading-tight">矮房<br/>(短週期)</span>
                            </div>
                        </div>
                    </div>
                );
                case 'liquefaction': return (
                    <div className="flex flex-col items-center justify-center bg-slate-900 h-64 rounded-[2.5rem] border-4 border-slate-800 shadow-inner">
                        <svg width="400" height="180" viewBox="0 0 400 180">
                            <rect x="50" y="30" width="300" height="130" fill="#451a03" opacity="0.2" rx="25" />
                            {[...Array(60)].map((_, i) => (
                                <circle key={i} cx={75 + (i%12)*25} cy={50 + Math.floor(i/12)*25} r={4} fill="#fbbf24" className="animate-[sand-shimmer_1.5s_ease-in-out_infinite]" style={{ animationDelay: `${Math.random() * 2}s` }} />
                            ))}
                            <g className="animate-[house-collapse_3s_ease-in-out_infinite]" style={{ transformOrigin: '200px 80px' }}>
                                <rect x="178" y="45" width="44" height="35" fill="#fff" stroke="#000" strokeWidth="2" />
                                <path d="M178 45 L200 20 L222 45 Z" fill="#ef4444" stroke="#000" strokeWidth="2" />
                            </g>
                        </svg>
                    </div>
                );
                case 'forecast_clock': return (
                    <div className="flex flex-col items-center justify-center bg-slate-900 h-64 rounded-[2.5rem] border-4 border-slate-800 shadow-inner">
                        <div className="relative w-40 h-40 rounded-full border-8 border-slate-700 bg-slate-800 shadow-2xl flex items-center justify-center overflow-hidden">
                            <div className="absolute w-1.5 h-16 bg-emerald-500 rounded-full origin-bottom animate-[sway-anim_10s_linear_infinite]" style={{ top: '24px' }}></div>
                            <div className="z-10 bg-slate-900/90 p-4 rounded-2xl border border-white/10 text-center">
                                <div className="text-emerald-400 font-black text-lg leading-none">30Y / 70%</div>
                                <div className="text-[8px] text-slate-400 mt-2 tracking-widest uppercase">機率統計模型</div>
                            </div>
                        </div>
                    </div>
                );
                case 'gap_pulse': return (
                    <div className="flex flex-col items-center justify-center bg-slate-900 h-64 rounded-[2.5rem] border-4 border-slate-800 shadow-inner">
                        <svg width="340" height="80" viewBox="0 0 340 80">
                            <rect x="10" y="30" width="80" height="15" fill="#10b981" rx="5" opacity="0.6" />
                            <rect x="100" y="30" width="140" height="15" className="animate-[gap-pulse_2s_infinite_ease-in-out]" rx="5" />
                            <rect x="250" y="30" width="80" height="15" fill="#10b981" rx="5" opacity="0.6" />
                            <text x="115" y="65" fill="#f87171" fontSize="11" fontWeight="black" tracking="2">LOCKED SEGMENT</text>
                        </svg>
                    </div>
                );
                case 'methods_monitor': return (
                    <div className="flex flex-col items-center justify-center bg-slate-900 h-64 rounded-[2.5rem] border-4 border-slate-800 shadow-inner">
                        <div className="grid grid-cols-2 gap-8 p-4">
                            <div className="flex flex-col items-center gap-3 p-6 bg-slate-800 rounded-[2rem] border border-slate-700 shadow-xl">
                                <Icon name="waves" size={40} className="text-blue-400 animate-pulse" />
                                <span className="text-[10px] text-slate-400 font-black uppercase">Vₚ/Vₛ Ratio</span>
                            </div>
                            <div className="flex flex-col items-center gap-3 p-6 bg-slate-800 rounded-[2rem] border border-slate-700 shadow-xl">
                                <Icon name="thermometer" size={40} className="text-red-400 animate-bounce" />
                                <span className="text-[10px] text-slate-400 font-black uppercase tracking-widest">Chemical</span>
                            </div>
                        </div>
                    </div>
                );
                case 'nuclear_pro': return (
                    <div className="w-full flex items-center justify-around bg-slate-900 h-64 rounded-[2.5rem] border-4 border-slate-800 shadow-inner">
                        <div className="flex flex-col items-center gap-4">
                            <div className="w-32 h-32 bg-slate-800 rounded-full border-2 border-red-500/20 relative flex items-center justify-center overflow-hidden">
                                <svg width="128" height="128" className="absolute">
                                    {[0, 1, 2].map(d => (
                                        <circle key={d} cx="64" cy="64" r="0" fill="none" stroke="#f87171" strokeWidth="2"
                                            style={{ animation: `nuclear-expand 2s linear infinite ${d*0.6}s` }} />
                                    ))}
                                </svg>
                                <div className="w-4 h-4 bg-red-500 rounded-full shadow-[0_0_15px_#ef4444]"></div>
                            </div>
                            <span className="text-[9px] text-red-400 font-black uppercase tracking-widest">核爆 (膨脹源)</span>
                        </div>
                        <div className="flex flex-col items-center gap-4">
                            <div className="w-32 h-32 bg-slate-800 rounded-full border-2 border-blue-500/20 relative flex items-center justify-center">
                                <div className="w-16 h-1.5 bg-blue-500 rounded animate-[fault-slip_1s_infinite_ease-in-out]"></div>
                                <div className="w-16 h-1.5 bg-blue-500 rounded animate-[fault-slip_1s_infinite_ease-in-out] rotate-90"></div>
                            </div>
                            <span className="text-[9px] text-blue-400 font-black uppercase tracking-widest">地震 (剪力源)</span>
                        </div>
                    </div>
                );
                default: return null;
            }
        };

        const App = () => {
            const [activePoint, setActivePoint] = useState(0);
            const [waveType, setWaveType] = useState('p');

            const points = [
                {
                    title: "1. 地震學研究範疇 ?",
                    icon: "microscope",
                    def: "地震學是研究彈性波在固體地球內部的激發、傳播及其物理機制的學門。透過波動觀測，我們旨在反演地球結構並揭示構造活動的動力過程。",
                    why: "地球內部充滿極端高壓與高溫，人類直接鑽探極限不到半徑的 0.2%。地震波是唯一能無損穿透全深度 6371 km 並回傳影像的「聲納」。",
                    logic: "物理核心：S-M-R (震源-介質-接收儀器) 系統。分析紀錄 U(t)，目的是剝離儀器響應 I(t) 與路徑效應 M(t)，解析出斷層破裂的物理參數 S(t)。",
                    teacher: "「範圍只包含地震嗎？」答：絕對不是。涵蓋核爆監測、火山震動、冰川地震、海嘯能量交換及人工震源分析。",
                    taiwan: "台灣位於板塊碰撞前緣。藉由高密度監測網，科學家建立了全球領先的 3D 震波速成像，清晰揭示了台灣下方隱沒帶的路徑。",
                    animationType: "quake_propagation",
                    summary: [
                        { key: "核心架構", val: "S-M-R 模型：震源 → 傳播介質 → 接收儀器。" },
                        { key: "科學價值", val: "行星層圈探測、地下資源定位與長期災害預報基礎。" }
                    ]
                },
                {
                    title: "2. 圖片說明區 1",
                    icon: "image",
                    def: "地震觀測幾何架構與波相特徵指紋分析：從理論物理射線路徑到數位波形記錄的時空轉化過程。",
                    why: "理解震波在層圈邊界產生的反射、折射與相位轉換行為，是精確判定震央定位、震源深度與破裂方向的基礎。掌握波相抵達的先後順序，即掌握了地底層圈的狀態碼。",
                    logic: "物理機制：遵循 Snell's Law。入射波撞擊速度不連續面（如 Moho 面）時會發生反射 (Reflection) 與相位轉換 (Conversion)。例如 P 波撞擊界面後部分能量轉為 S 波。這些相變波是測算地殼厚度的核心物理判據。",
                    teacher: "「為什麼表面波振幅最大？」答：源於幾何擴散效應差異。體波 (P, S) 能量分佈在持續擴張的球面上，振幅隨 1/r² 衰減；而表面波能量被引導在地表層傳播，僅隨 1/r 衰減。表面波頻率低、能量密度高，故傳播極遠且晃動更具破壞性。",
                    taiwan: "結合強震觀測，台灣氣象署利用 P 波初動極性（壓縮或張裂）僅需 5-10 秒便能判定主斷層的破裂形式（逆衝或平移），這在黃金預警時間中扮演了決策關鍵角色。",
                    animationType: "wave_interactive",
                    images: [
                        { url: "https://raw.githubusercontent.com/JinJia0618/-seismology_homework2/main/1-1.1.png", cap: "圖 1.1 幾何架構：展示震源（Source）釋放能量脈衝穿過內部介質到達接收儀（Receiver）的空間路徑，是建立走時理論 (Travel-time) 的物理基礎模型。" },
                        { url: "https://raw.githubusercontent.com/JinJia0618/-seismology_homework2/main/1-1.2.png", cap: "圖 1.2 波動物理：呈現彈性介質中質點隨時間與空間位移的簡諧振動模式，用於解釋頻率、週期、波長與相位在能量輸送中的物理意義。" },
                        { url: "https://raw.githubusercontent.com/JinJia0618/-seismology_homework2/main/1-1.3.png", cap: "圖 1.3 地震圖波相指紋：標記了最先抵達的 P 波（疏密波）與隨後的 S 波（剪力波）。後段出現的高振幅信號即為具備強大破壞力的長週期表面波。" },
                        { url: "https://raw.githubusercontent.com/JinJia0618/-seismology_homework2/main/1-1.4.png", cap: "圖 1.4 界面行為：描述入射波遇到不連續面（如莫氏面）產生的反射與折射現象。這是測算地殼深度與層圈性質的關鍵。" },
                        { url: "https://raw.githubusercontent.com/JinJia0618/-seismology_homework2/main/1-1.5.png", cap: "圖 1.5 質點運動模式：對比體波特性。P 波沿波向前後振動（體積縮放），S 波垂直波向側向振動（剪切）。這解釋了為何 S 波無法在流體核心中傳遞。" }
                    ],
                    summary: [
                        { key: "到時順序", val: "Vₚ > Vₛ > Vₛᵤᵣfₐcₑ。速度差異是強震即時警報系統運作的物理本質。" },
                        { key: "界面現象", val: "遇到界面發生 Reflection (反射)、Refraction (折射) 與相位轉換 (Conversion)。" },
                        { key: "質點性質", val: "P 為壓縮波；S 為剪力波 (在 μ = 0 的流體中消失)。" }
                    ]
                },
                {

                                <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest bg-slate-800 px-3 py-1.5 rounded-full border border-slate-700">最終部署 · V3.26</span>
                            </div>
                        </div>
                    </header>

                    <div className="flex flex-1 overflow-hidden">
                        {/* Sidebar Navigation */}
                        <nav className="w-80 bg-white border-r border-slate-200 overflow-y-auto p-4 shrink-0 shadow-sm scrollbar-thin">
                            <div className="flex items-center gap-2 mb-6 px-4 py-2 bg-emerald-50 rounded-2xl border border-emerald-100">
                                <Icon name="layers" size={16} className="text-emerald-700" />
                                <p className="text-[11px] font-black text-emerald-700 uppercase tracking-widest">章節導覽</p>
                            </div>
                            <div className="space-y-1">
                                {points.map((p, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => setActivePoint(idx)}
                                        className={`w-full flex items-center gap-4 px-5 py-4 rounded-2xl transition-all duration-300 text-left group border-2 ${
                                            activePoint === idx 
                                            ? 'bg-emerald-700 text-white border-emerald-800 shadow-xl' 
                                            : 'bg-emerald-50 border-transparent text-slate-600 hover:bg-emerald-100'
                                        }`}
                                    >
                                        <Icon 
                                            name={p.icon} 
                                            className={activePoint === idx ? 'text-white' : 'text-emerald-700'} 
                                        />
                                        <span className={`text-[11px] font-bold uppercase tracking-wide ${activePoint === idx ? 'text-white' : 'text-slate-700'}`}>{p.title}</span>
                                    </button>
                                ))}
                            </div>
                        </nav>

                        <main className="flex-1 overflow-y-auto bg-slate-50 p-6 lg:p-12 scroll-smooth">
                            <div className="max-w-5xl mx-auto space-y-12" key={activePoint}>
                                <div className="border-b-4 border-slate-200 pb-10 flex justify-between items-end relative">
                                    <div className="z-10">
                                        <span className="text-emerald-600 text-xs font-black uppercase tracking-widest bg-emerald-50 px-4 py-1.5 rounded-full border border-emerald-100">精熟學習路徑 (Advanced Note)</span>
                                        <h2 className="text-4xl font-black text-slate-900 mt-6 tracking-tighter leading-tight uppercase">{points[activePoint].title}</h2>
                                    </div>
                                    <div className="text-slate-100 font-black text-[10rem] leading-none absolute right-0 -z-0 select-none opacity-50">
                                        {activePoint + 1}
                                    </div>
                                </div>

                                {/* Animation Canvas Area */}
                                {points[activePoint].animationType && (
                                    <div className="bg-slate-900 rounded-[3rem] p-12 shadow-2xl relative overflow-hidden border-4 border-slate-800">
                                        <div className="absolute top-8 left-10 z-10 flex items-center gap-3">
                                            <div className="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_10px_#10b981] animate-pulse"></div>
                                            <span className="text-[10px] font-black text-emerald-400 uppercase tracking-[0.3em]">Scientific Animation Engine</span>
                                        </div>
                                        <div className="min-h-[320px] flex items-center justify-center relative">
                                            <VisualSim type={points[activePoint].animationType} waveType={waveType} setWaveType={setWaveType} />
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 gap-10">
                                    <div className="bg-white p-12 rounded-[3rem] shadow-sm border border-slate-200 hover:shadow-xl transition-all duration-500">
                                        <div className="flex items-center gap-4 mb-10">
                                            <div className="w-12 h-12 rounded-3xl bg-emerald-600 flex items-center justify-center text-white shadow-lg"><Icon name="book-open" size={24} className="text-white"/></div>
                                            <h3 className="text-2xl font-black text-slate-900 tracking-tight tracking-wide uppercase">學術觀念深度解析</h3>
                                        </div>
                                        <div className="space-y-12">
                                            <div className="bg-slate-50 p-8 rounded-[2rem] border-l-8 border-emerald-600 shadow-inner">
                                                <h4 className="text-[11px] font-black text-slate-400 uppercase mb-4 tracking-widest">科學定義</h4>
                                                <p className="text-xl font-bold text-slate-800 leading-relaxed">{points[activePoint].def}</p>
                                            </div>

                                            {points[activePoint].images && (
                                                <div className="my-10 space-y-16">
                                                    <h4 className="text-xs font-black text-slate-400 uppercase tracking-[0.4em] text-center border-y py-4 bg-slate-50/50 rounded-xl">Visual Data Interpretation (Unicode)</h4>
                                                    <div className="flex flex-col gap-20">
                                                        {points[activePoint].images.map((img, i) => (
                                                            <div key={i} className="flex flex-col gap-10 bg-white p-8 rounded-[3rem] border border-slate-100 shadow-[0_20px_50px_rgba(0,0,0,0.05)]">
                                                                <div className="w-full rounded-2xl overflow-hidden border-8 border-slate-50 shadow-inner bg-slate-50 p-4">
                                                                    <img src={img.url} alt={img.cap} className="w-full h-auto object-contain max-h-[1000px] mx-auto hover:scale-[1.01] transition-transform duration-500" />
                                                                </div>
                                                                <div className="px-6">
                                                                    <div className="flex items-center gap-4 mb-6">
                                                                        <span className="w-10 h-10 rounded-2xl bg-emerald-700 text-white flex items-center justify-center text-xs font-black shadow-lg">0{i+1}</span>
                                                                        <span className="text-xs font-black text-emerald-700 uppercase tracking-[0.3em]">Scientific Interpretation</span>
                                                                    </div>
                                                                    <div className="bg-slate-50 p-8 rounded-[2rem] border-l-8 border-emerald-700">
                                                                        <p className="text-[15px] text-slate-700 leading-loose font-bold whitespace-pre-wrap italic">{img.cap}</p>
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                            
                                            {points[activePoint].summary && (
                                                <div className="mt-12 bg-slate-900 p-10 rounded-[3rem] shadow-2xl">
                                                   <h4 className="text-xs font-black text-emerald-400 uppercase tracking-[0.3em] mb-8 text-center border-b border-emerald-500/30 pb-4 flex items-center justify-center gap-2">
                                                      <Icon name="list" size={16} className="text-emerald-400" /> 核心要點總結 (Summary)
                                                   </h4>
                                                   <div className="space-y-4">
                                                      {points[activePoint].summary.map((item, idx) => (
                                                         <div key={idx} className="flex flex-col md:flex-row gap-4 border-b border-white/10 pb-4 last:border-0">
                                                            <div className="md:w-1/3 text-emerald-300 font-black text-sm uppercase tracking-wider">{item.key}</div>
                                                            <div className="md:w-2/3 text-slate-300 text-sm leading-relaxed font-bold">{item.val}</div>
                                                         </div>
                                                      ))}
                                                   </div>
                                                </div>
                                            )}

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-12 pt-8">
                                                <div>
                                                    <h4 className="text-[11px] font-black text-emerald-700 uppercase mb-4 tracking-widest underline decoration-2">為什麼重要</h4>
                                                    <p className="text-[15px] text-slate-600 leading-relaxed font-medium">{points[activePoint].why}</p>
                                                </div>
                                                <div>
                                                    <h4 className="text-[11px] font-black text-indigo-700 uppercase mb-4 tracking-widest underline decoration-2">物理建模基礎 (Unicode)</h4>
                                                    <p className="text-[15px] text-slate-700 italic leading-relaxed font-medium bg-indigo-50/30 p-4 rounded-2xl whitespace-pre-wrap shadow-inner">{points[activePoint].logic}</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 p-12 rounded-[3.5rem] shadow-2xl text-white relative overflow-hidden">
                                        <div className="absolute -bottom-10 -right-10 p-8 opacity-5"><Icon name="activity" size={300} className="text-emerald-600"/></div>
                                        <div className="relative z-10 space-y-12">
                                            <div className="flex items-center gap-4 mb-2">
                                                <div className="w-12 h-12 rounded-3xl bg-amber-500 flex items-center justify-center text-white shadow-lg"><Icon name="help-circle" size={24} className="text-white"/></div>
                                                <h3 className="text-2xl font-black text-white tracking-tight tracking-wide uppercase">學術重點補充</h3>
                                            </div>
                                            <div className="p-10 bg-white/5 rounded-[2.5rem] border border-white/10 backdrop-blur-md">
                                                <h4 className="text-[11px] font-black text-amber-400 uppercase mb-6 tracking-widest flex items-center gap-2">
                                                    <Icon name="arrow-right" size={14} className="text-amber-400" /> 老師追問可以這樣回答：
                                                </h4>
                                                <p className="text-[16px] text-slate-200 font-bold leading-relaxed">{points[activePoint].teacher}</p>
                                            </div>
                                            <div className="px-4">
                                                <h4 className="text-[11px] font-black text-emerald-400 uppercase mb-4 tracking-widest flex items-center gap-2">
                                                    <Icon name="map" size={14} className="text-emerald-400" /> 台灣案例 (Local Focus)
                                                </h4>
                                                <p className="text-[15px] text-slate-400 font-medium leading-relaxed border-l-2 border-slate-700 pl-6">{points[activePoint].taiwan}</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex justify-between items-center py-16 border-t-2 border-slate-200">
                                    <button 
                                        disabled={activePoint === 0}
                                        onClick={() => setActivePoint(activePoint - 1)}
                                        className={`group flex items-center gap-4 px-10 py-5 rounded-full font-black text-[11px] tracking-widest transition-all ${activePoint === 0 ? 'opacity-20' : 'bg-slate-200 hover:bg-slate-300'}`}
                                    >
                                        <Icon name="arrow-right" className="rotate-180 transition-transform" /> PREV
                                    </button>
                                    <div className="text-slate-400 font-mono text-[13px] tracking-[0.5em] font-black">
                                        {activePoint + 1} / {points.length}
                                    </div>
                                    <button 
                                        disabled={activePoint === points.length - 1}
                                        onClick={() => setActivePoint(activePoint + 1)}
                                        className={`group flex items-center gap-4 px-10 py-5 rounded-full font-black text-[11px] tracking-widest transition-all ${activePoint === points.length - 1 ? 'opacity-20' : 'bg-emerald-700 text-white hover:bg-emerald-800 shadow-lg'}`}
                                    >
                                        NEXT <Icon name="arrow-right" className="transition-transform" />
                                    </button>
                                </div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
