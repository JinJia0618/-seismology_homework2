<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地震學 Master Pro - 從 0 到 1 專業筆記</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* CSS 動畫引擎：定義所有關鍵幀 */
        @keyframes waveP { 0%, 100% { transform: translateX(0); opacity: 0.4; } 50% { transform: translateX(15px); opacity: 1; } }
        @keyframes waveS { 0%, 100% { transform: translateY(-20px); } 50% { transform: translateY(20px); } }
        @keyframes waveR { 0% { transform: translate(0, 0); } 25% { transform: translate(12px, -12px); } 50% { transform: translate(0, 0); } 75% { transform: translate(-12px, 12px); } 100% { transform: translate(0, 0); } }
        @keyframes spirit-rotate { 0% { transform: rotate(0); } 100% { transform: rotate(360deg); } }
        @keyframes scan-line { 0% { left: -100%; } 100% { left: 100%; } }
        @keyframes pulse-ring { 0% { r: 5; opacity: 1; } 100% { r: 60; opacity: 0; } }
        @keyframes float-y { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes drill-drill { 0% { transform: translateY(-20px); } 50% { transform: translateY(20px); } 100% { transform: translateY(-20px); } }
        @keyframes dash-flow { 0% { stroke-dashoffset: 400; } 100% { stroke-dashoffset: 0; } }
        @keyframes sway-anim { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        @keyframes sand-shimmer { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(2px, -3px); } }
        @keyframes house-collapse { 0% { transform: rotate(0) translateY(0); } 50% { transform: rotate(18deg) translateY(12px); } 100% { transform: rotate(0) translateY(0); } }
        @keyframes tide-move { 0% { transform: scaleY(0.15); } 50% { transform: scaleY(1.1); } 100% { transform: scaleY(0.15); } }
        
        .scrollbar-thin::-webkit-scrollbar { width: 6px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        body { background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 1. 基礎輔助組件 ---
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) { window.lucide.createIcons(); }
            }, [name]);
            return <span className="inline-flex items-center justify-center"><i key={name} data-lucide={name} style={{ width: size, height: size }} className={className}></i></span>;
        };

        const WaveProp = ({ type }) => {
            const cols = 22;
            const rows = 6;
            let name = type === 'p' ? "waveP" : type === 's' ? "waveS" : "waveR";
            let duration = type === 's' ? '1.8s' : '1.2s';
            return (
                <div className="w-full">
                    <svg width="100%" height="180" viewBox="0 0 600 180" className="mx-auto overflow-visible">
                        {[...Array(cols)].map((_, i) => (
                            [...Array(rows)].map((_, j) => (
                                <circle 
                                    key={`${i}-${j}`} 
                                    cx={50 + i * 24} cy={35 + j * 24} 
                                    r={j === 0 ? 5 : 2.5} 
                                    fill={type === 'p' ? '#10b981' : type === 's' ? '#f87171' : '#60a5fa'} 
                                    opacity={1 - j * 0.15}
                                    style={{ 
                                        animationName: name,
                                        animationDuration: duration,
                                        animationIterationCount: 'infinite',
                                        animationTimingFunction: 'ease-in-out',
                                        animationDelay: `${i * 0.15}s` 
                                    }}
                                />
                            ))
                        ))}
                    </svg>
                </div>
            );
        };

        // --- 2. 各章節模擬引擎組件 ---
        const VisualSim = ({ type, waveType, setWaveType }) => {
            switch (type) {
                case 'spirit': return (
                    <div className="relative w-64 h-64 bg-slate-800 rounded-full flex items-center justify-center border-4 border-slate-700 shadow-xl">
                        <div className="absolute inset-2 border-2 border-dashed border-emerald-500/20 rounded-full animate-[spirit-rotate_20s_linear_infinite]"></div>
                        <div className="text-emerald-400 animate-[float-y_4s_ease-in-out_infinite]"><Icon name="globe" size={100} /></div>
                    </div>
                );
                case 'wave_dynamic': return (
                    <div className="w-full flex flex-col items-center">
                        <WaveProp type={waveType} />
                        <div className="flex gap-4 mt-8 bg-slate-800/80 p-2 rounded-full border border-slate-700 shadow-2xl">
                            {['p', 's', 'rayleigh'].map(t => (
                                <button key={t} onClick={() => setWaveType(t)} className={`px-6 py-1.5 rounded-full text-[9px] font-black uppercase transition-all ${waveType === t ? 'bg-emerald-500 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'}`}>{t}</button>
                            ))}
                        </div>
                    </div>
                );
                case 'smr_flow': return (
                    <div className="flex items-center gap-12 relative">
                        <div className="flex flex-col items-center gap-3"><div className="w-14 h-14 bg-red-500 rounded-2xl flex items-center justify-center shadow-lg"><Icon name="zap" className="text-white"/></div><span className="text-[10px] text-slate-400 font-black">SOURCE</span></div>
                        <div className="w-24 h-1 bg-slate-700 relative overflow-hidden rounded-full"><div className="absolute h-full w-full bg-emerald-500 animate-[scan-line_2s_linear_infinite]"></div></div>
                        <div className="flex flex-col items-center gap-3"><div className="w-14 h-14 bg-emerald-500 rounded-2xl flex items-center justify-center shadow-lg"><Icon name="layers" className="text-white"/></div><span className="text-[10px] text-slate-400 font-black">MEDIUM</span></div>
                        <div className="w-24 h-1 bg-slate-700 relative overflow-hidden rounded-full"><div className="absolute h-full w-full bg-blue-500 animate-[scan-line_2s_linear_infinite_1s]"></div></div>
                        <div className="flex flex-col items-center gap-3"><div className="w-14 h-14 bg-blue-500 rounded-2xl flex items-center justify-center shadow-lg"><Icon name="activity" className="text-white"/></div><span className="text-[10px] text-slate-400 font-black">RECEIVER</span></div>
                    </div>
                );
                case 'depth_compare': return (
                    <div className="flex items-center gap-12">
                        <div className="h-64 w-10 bg-slate-800 rounded-full relative border-4 border-slate-700 overflow-hidden shadow-inner">
                            <div className="absolute top-0 w-full h-[6%] bg-orange-500"></div>
                            <div className="absolute top-[3%] left-1/2 -translate-x-1/2 w-0.5 h-14 bg-white shadow-[0_0_10px_white] animate-[drill-drill_2s_ease-in-out_infinite]"></div>
                            <div className="absolute bottom-2 left-0 w-full text-center text-[7px] text-slate-500 font-black">6371KM</div>
                        </div>
                        <div className="space-y-4 text-left">
                            <div className="flex items-center gap-3"><div className="w-4 h-4 bg-orange-500 rounded shadow-lg"></div><span className="text-xs text-slate-200 font-black uppercase tracking-widest">Physical Limit</span></div>
                            <div className="flex items-center gap-3"><div className="w-4 h-4 bg-emerald-500 rounded shadow-[0_0_10px_#10b981] animate-pulse"></div><span className="text-xs text-emerald-400 font-black uppercase tracking-widest">Wave Probing</span></div>
                        </div>
                    </div>
                );
                case 'inversion_box': return (
                    <div className="w-56 h-56 bg-slate-800 rounded-[2.5rem] border-4 border-dashed border-slate-700 flex items-center justify-center relative shadow-2xl overflow-hidden">
                        <div className="text-emerald-500 animate-[float-y_4s_ease-in-out_infinite]"><Icon name="binary" size={80} /></div>
                        <div className="absolute top-4 left-4 bg-slate-900/80 px-2 py-1 rounded text-[7px] text-slate-500 font-black uppercase">Observed Signal</div>
                        <div className="absolute bottom-4 right-4 bg-emerald-900/50 px-2 py-1 rounded text-[7px] text-emerald-400 font-black border border-emerald-500/20 uppercase">Structural Model</div>
                    </div>
                );
                case 'hazard_bell': return (
                    <svg width="400" height="200" viewBox="0 0 400 200">
                        <path d="M20 180 Q 200 20, 380 180" fill="none" stroke="#f87171" strokeWidth="4" strokeDasharray="10 5" className="animate-[dash-flow_5s_linear_infinite]" />
                        <line x1="200" y1="180" x2="200" y2="40" stroke="#fff" strokeWidth="2" strokeDasharray="3 3" opacity="0.4" />
                        <circle cx="200" cy="180" r="5" fill="#fff" />
                        <text x="210" y="60" fill="#f87171" fontSize="12" fontWeight="black" className="animate-[float-y_2s_ease-in-out_infinite]">PEAK PGA PROBABILITY</text>
                        <rect x="0" y="180" width="400" height="2" fill="#334155" />
                    </svg>
                );
                case 'risk_balance': return (
                    <div className="flex flex-col items-center gap-10 animate-[sway-anim_4s_ease-in-out_infinite]">
                        <svg width="320" height="120" viewBox="0 0 320 120">
                            <line x1="20" y1="90" x2="300" y2="90" stroke="#fff" strokeWidth="6" strokeLinecap="round" />
                            <rect x="30" y="40" width="90" height="50" fill="#ef4444" rx="15" />
                            <text x="45" y="70" fill="#fff" fontSize="11" fontWeight="black">HAZARD</text>
                            <rect x="200" y="40" width="90" height="50" fill="#10b981" rx="15" />
                            <text x="205" y="70" fill="#fff" fontSize="9" fontWeight="black">MITIGATION</text>
                            <circle cx="160" cy="90" r="12" fill="#475569" />
                        </svg>
                    </div>
                );
                case 'engineering_shake': return (
                    <div className="flex flex-col items-center gap-8">
                        <div className="relative w-24 h-48 border-x-4 border-t-4 border-slate-600 rounded-t-3xl bg-slate-800/30 flex items-center justify-center animate-[sway-anim_1.2s_ease-in-out_infinite]" style={{ transformOrigin: 'bottom' }}>
                            <div className="w-16 h-0.5 bg-slate-700 rounded-full opacity-30"></div>
                            <svg className="absolute inset-0 w-full h-full pointer-events-none">
                                <line x1="0" y1="30" x2="100" y2="30" stroke="#10b981" strokeWidth="2" opacity="0.3" />
                            </svg>
                        </div>
                        <div className="w-48 h-3 bg-slate-700 rounded-full shadow-inner animate-pulse"></div>
                        <p className="text-[10px] text-emerald-400 font-black uppercase tracking-widest">Resilience Modeling</p>
                    </div>
                );
                case 'liquefaction_sim': return (
                    <div className="flex flex-col items-center">
                        <svg width="400" height="200" viewBox="0 0 400 200">
                            <rect x="50" y="50" width="300" height="130" fill="#451a03" opacity="0.2" rx="25" />
                            {[...Array(80)].map((_, i) => (
                                <circle key={i} cx={75 + (i%16)*18} cy={70 + Math.floor(i/16)*22} r={4} fill="#fbbf24" className="animate-[sand-shimmer_1.5s_ease-in-out_infinite]" style={{ animationDelay: `${Math.random() * 2}s` }} />
                            ))}
                            <g className="animate-[house-collapse_3s_ease-in-out_infinite]" style={{ transformOrigin: '200px 100px' }}>
                                <rect x="178" y="65" width="44" height="35" fill="#fff" stroke="#000" strokeWidth="2" />
                                <path d="M178 65 L200 40 L222 65 Z" fill="#ef4444" stroke="#000" strokeWidth="2" />
                            </g>
                        </svg>
                        <div className="mt-4 px-4 py-1.5 bg-amber-900/30 border border-amber-500/20 rounded-full">
                            <p className="text-[9px] text-amber-500 font-black uppercase tracking-widest underline">Effective Stress {'\u2192'} 0</p>
                        </div>
                    </div>
                );
                case 'tsunami_wall': return (
                    <div className="relative w-80 h-40 bg-slate-800 rounded-[3rem] overflow-hidden border-4 border-slate-700 shadow-2xl flex items-end">
                        <div className="w-full h-full bg-blue-600/20 relative">
                            <div className="absolute bottom-0 w-full bg-blue-500 shadow-[0_-20px_40px_rgba(59,130,246,0.4)] animate-[tide-move_4s_ease-in-out_infinite]" style={{ height: '85%', transformOrigin: 'bottom' }}>
                                <div className="w-full h-10 bg-white/20 backdrop-blur-sm"></div>
                            </div>
                        </div>
                        <div className="absolute top-8 left-10 text-white font-black text-[10px] tracking-[0.5em] uppercase opacity-40">Tsunami Energy Wall</div>
                    </div>
                );
                case 'forecasting_clock': return (
                    <div className="relative w-56 h-56 rounded-full border-8 border-slate-700 bg-slate-800 shadow-[inset_0_0_50px_rgba(0,0,0,0.6)] flex items-center justify-center overflow-hidden">
                        <div className="absolute w-1.5 h-24 bg-emerald-500 rounded-full origin-bottom shadow-[0_0_15px_#10b981] animate-[sway-anim_12s_linear_infinite]" style={{ top: '32px' }}></div>
                        <div className="z-10 bg-slate-900/90 p-6 rounded-[2.5rem] border border-white/10 text-center shadow-2xl">
                            <div className="text-emerald-400 font-black text-xl leading-none">30Y / 70%</div>
                            <div className="text-slate-500 font-bold text-[8px] uppercase tracking-widest mt-2">Probabilistic Model</div>
                        </div>
                    </div>
                );
                case 'nuclear_sim': return (
                    <div className="w-80 h-64 bg-slate-800/80 rounded-[3.5rem] border-2 border-white/10 relative p-12 overflow-hidden shadow-2xl">
                        <div className="absolute left-14 bottom-14 w-[75%] h-[2px] bg-slate-600"></div>
                        <div className="absolute left-14 bottom-14 h-[75%] w-[2px] bg-slate-600"></div>
                        <svg className="absolute inset-0 w-full h-full pointer-events-none">
                            <path d="M70 180 L250 50" stroke="#6366f1" strokeWidth="4" strokeDasharray="12 6" opacity="0.6" />
                            <circle cx="110" cy="90" r="10" fill="#f87171" className="animate-pulse shadow-[0_0_20px_#f87171]" />
                            <circle cx="210" cy="150" r="10" fill="#10b981" />
                        </svg>
                        <div className="absolute top-12 right-12 text-[8px] text-red-400 font-black bg-red-950/40 px-3 py-1.5 rounded-full border border-red-900/30 tracking-widest uppercase text-center">mb / Ms<br/>Discrimination</div>
                    </div>
                );
                case 'ims_network': return (
                    <div className="w-72 h-72 relative bg-slate-800 rounded-full border-4 border-slate-700 flex items-center justify-center overflow-hidden">
                        <div className="opacity-20"><Icon name="globe" size={130} /></div>
                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                            {[...Array(4)].map((_, i) => (
                                <svg key={i} className="absolute inset-0 w-full h-full">
                                    <circle cx="144" cy="144" r="10" fill="none" stroke="#10b981" strokeWidth={2.5}
                                        className="animate-[pulse-ring_4s_linear_infinite]"
                                        style={{ animationDelay: `${i*1}s` }}
                                    />
                                </svg>
                            ))}
                        </div>
                        <div className="absolute top-12 right-12 text-emerald-400 drop-shadow-[0_0_15px_#10b981]"><Icon name="radio" size={32} className="animate-pulse" /></div>
                        <div className="absolute bottom-12 left-12 text-blue-400 drop-shadow-[0_0_15px_#3b82f6]"><Icon name="wind" size={32} className="animate-pulse" /></div>
                    </div>
                );
                default: return null;
            }
        };

        // --- 3. 主 App 組件 ---
        const App = () => {
            const [activePoint, setActivePoint] = useState(0);
            const [waveType, setWaveType] = useState('p');

            const points = [
                {
                    title: "重點#1：科學精神——探究地球的樂趣",
                    icon: "microscope",
                    def: "地震學是藉由彈性波解密固體地球內部的科學，強調好奇心驅動的探索過程。",
                    why: "解決人類無法直接「觸摸」地心的物理限制。它將地質參數轉化為充滿偵探樂趣的解密挑戰。",
                    logic: "科學建模基礎：將地球視為一個充滿物理特徵（密度、彈性係數）的巨大實驗室。研究核心在於透過地表「聽」到的聲音，診斷出內部的物理狀態。教材指出：科學研究應是有趣且具吸引力的 (Fun \u0026 Interesting)。",
                    teacher: "「為什麼地震學被視為地科基石？」答：它是唯一能提供全地球深度物理屬性（如密度、波速）高解析影像的工具，是驗證板塊構造與行星演化的最強物理證據。",
                    taiwan: "台灣地殼厚度（中央山脈下方約 45km）與隱沒帶角度，是利用全台測站的反演模型共同繪製，證明了造山運動的深層根基。",
                    animationType: "spirit"
                },
                {
                    title: "重點#2：地震波物理——能量的指紋",
                    icon: "waves",
                    def: "彈性波是質點受力偏離平衡後產生的波動。P波感應體積縮放，S波感應形狀剪切。",
                    why: "波動力學是解碼震源與介質的基礎語法。理解波速公式能讓我們推論地底物質的軟硬程度與相態。",
                    logic: "科學建模基礎：波速公式 Vp \u003D \u221A((k \u002B 4/3\u03BC) / \u03C1) 與 Vs \u003D \u221A(\u03BC/\u03C1)。觀察圖(一)可見地震波在內部界面發生的反射 (Reflection) 與轉換 (Conversion)。圖(二)則展示了觀測量上的物理順序：P 波最快、S 波居中、表面波最晚抵達但振幅最大。",
                    teacher: "「為何液體外核不傳 S 波？」答：流體的剪切模數 \u03BC \u003D 0（無法抵抗歪斜形變）。這現象成功界定了 2900km 深處的外核邊界，是地震學最震撼的物理發現。",
                    taiwan: "台灣 EEW 預警系統利用 P-S 時差。403 花蓮地震時，電腦搶在強烈 S 波與高振幅表面波到達前發布警報，正是基於波速與到時理論。",
                    animationType: "wave_dynamic",
                    images: [
                        {
                            url: "https://raw.githubusercontent.com/JinJia0618/-seismology_homework2/main/%E8%9E%A2%E5%B9%95%E6%93%B7%E5%8F%96%E7%95%AB%E9%9D%A2%202026-03-04%20191952.png",
                            caption: "圖(一)：震波路徑與射線理論。描述地震波遇到地層界面時的反射 (Reflection) 與相變轉換 (Conversion)。例如 P 波撞擊界面後可能轉換成 S 波，這讓我們能探測地球層圈的物理性質。"
                        },
                        {
                            url: "https://raw.githubusercontent.com/JinJia0618/-seismology_homework2/main/%E8%9E%A2%E5%B9%95%E6%93%B7%E5%8F%96%E7%95%AB%E9%9D%A2%202026-03-04%20191355.png",
                            caption: "圖(二)：地震圖各波相到時與振幅指紋。呈現 P 波、S 波與表面波的抵達順序。表面波因其長週期特性與能量導引作用，抵達時間最晚，但振幅能量通常最大，是致災主因。"
                        }
                    ]
                },
                {
                    title: "重點#3：基本架構——S-M-R 模型",
                    icon: "activity",
                    def: "地震紀錄由三者決定：震源 (Source)、傳播路徑 (Medium) 與接收儀器 (Receiver)。",
                    why: "這是分析的出發點。地震圖訊號 U(t) 是這三個變數的加總與交互作用（摺積）。",
                    logic: "科學建模基礎：U(t) \u003D S(t) \u2217 M(t) \u2217 I(t)。地震學家的工作通常是透過「去摺積」移除儀器影響 (I)，專注分析斷層破裂細節 (S) 或地層結構屬性 (M)。",
                    teacher: "「哪個變數最難處理？」答：傳播介質 (Medium)。地球內部充滿非均質體、衰減區與異向性體，會產生複雜折射與散射，使訊號像是在大霧中行駛。",
                    taiwan: "台灣寬頻地震網 (BATS) 提供了高品質的紀錄 (Receiver)，讓我們能從雜訊中分離出斷層滑移的細部特徵 (Source)。",
                    animationType: "smr_flow"
                },
                {
                    title: "重點#4：探測深度——從皮層到地心",
                    icon: "globe",
                    def: "鑽探深度極限僅 13km，但地震波能無損穿透 6371km 全深度。",
                    why: "鑽探深度不到地球半徑 0.2%。地震波是人類觀察行星深處物理狀態的唯一「X光」。",
                    logic: "科學建模基礎：將地球視為層圈結構。透過觀察波速隨深度產生的不連續跳躍（如 Moho 面與 CMB 古氏面），我們推導出地殼、地函與核心的分界。",
                    teacher: "「走時曲線為什麼是弧形？」答：因為地球內部的波速隨深度增加而加快，導致震波向地表折射彎曲，路徑呈現向下的凸形弧線而非直線。",
                    taiwan: "利用反射震測技術，台灣科學家在西部平原探測深達數公里的沉積構造，藉此尋找地下流體儲集層或活動斷層位置。",
                    animationType: "depth_compare"
